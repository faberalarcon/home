name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref to save minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: check + build
    runs-on: ubuntu-latest
    env:
      # Server modules mkdir their upload dir at import time; the build's
      # analyse step runs that. Point it at a writable temp dir (prod sets
      # this via deploy.sh) so the build doesn't try the root-owned default.
      UPLOADS_DIR: ${{ runner.temp }}/uploads
    steps:
      - uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3 # v6.0.0
      - uses: actions/setup-node@2028fbc5c25fe9cf00d9f06a71cc4710d4507903 # v6.0.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run check
      - run: npm run build
