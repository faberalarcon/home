services:
  drink-hub:
    build:
      context: .
      args:
        - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    container_name: drink-hub
    restart: unless-stopped
    ports:
      # Bind to loopback only — nginx (or another reverse proxy) should front this.
      # The app is not meant to be reachable directly from the public internet.
      - "127.0.0.1:5173:3000"
    volumes:
      - ./data:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - DATABASE_PATH=/app/data/drink-hub.db
      - BODY_SIZE_LIMIT=10485760
      - ORIGIN=${ORIGIN:-https://drink-hub.21bristoe.com}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - ADDRESS_HEADER=x-forwarded-for
      - XFF_DEPTH=1
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SITE_PASSWORD_HASH=${SITE_PASSWORD_HASH:-}
      - ADMIN_PIN=${ADMIN_PIN:-}
      - ADMIN_PIN_HASH=${ADMIN_PIN_HASH:-}
      - TZ=${TZ:-America/New_York}
    extra_hosts:
      - "ai.local:host-gateway"
