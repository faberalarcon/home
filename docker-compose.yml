services:
  drink-hub:
    build: .
    container_name: drink-hub
    restart: unless-stopped
    ports:
      - "5173:3000"
    volumes:
      - ./data:/app/data
    environment:
      - DATABASE_PATH=/app/data/drink-hub.db
      - BODY_SIZE_LIMIT=10485760
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SITE_PASSWORD_HASH=${SITE_PASSWORD_HASH:-}
    extra_hosts:
      - "ai.local:host-gateway"
