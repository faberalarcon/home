services:
  site:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: 21bristoe-site
    restart: unless-stopped
    ports:
      - "127.0.0.1:6173:3000"
    volumes:
      - ${DRINK_HUB_DATA_DIR:-/var/lib/21bristoe/drink-hub}:/app/data
      - ${MEDIA_DIR:-/var/www/21bristoe-media}:/var/www/21bristoe-media
      - /var/lib/bristoe-backup:/var/lib/bristoe-backup:ro
      - /var/lib/bristoe-stats:/var/lib/bristoe-stats:ro
      - /mnt/usbbackup:/mnt/usbbackup:ro
    read_only: true
    tmpfs:
      - /tmp:size=64m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - DATABASE_PATH=/app/data/drink-hub.db
      - UPLOADS_DIR=/var/www/21bristoe-media
      - BODY_SIZE_LIMIT=104857600
      - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://21bristoe.com,https://admin.21bristoe.com}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - ADDRESS_HEADER=x-forwarded-for
      - XFF_DEPTH=1
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SITE_PASSWORD_HASH=${SITE_PASSWORD_HASH:-}
      - GOOBY_PASSWORD=${GOOBY_PASSWORD:-}
      - GOOBY_PASSWORD_HASH=${GOOBY_PASSWORD_HASH:-}
      - GOOBY_DATABASE_PATH=${GOOBY_DATABASE_PATH:-/app/data/gooby-gpt.db}
      - LLAMA_BASE_URL=${LLAMA_BASE_URL:-http://192.168.1.215:8080}
      - WHISPER_BASE_URL=${WHISPER_BASE_URL:-http://192.168.1.215:8081}
      - WHISPER_MODEL=${WHISPER_MODEL:-base.en}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - ADMIN_SHARED_SECRET=${ADMIN_SHARED_SECRET:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - HA_STRICT_PUBLIC=${HA_STRICT_PUBLIC:-}
      - HA_BASE_URL=${HA_BASE_URL:-http://ai.local:8123}
      - HA_TOKEN=${HA_TOKEN:-}
      - EV_COST_PER_KWH=${EV_COST_PER_KWH:-0.12}
      - PRINTER_BASE_URL=${PRINTER_BASE_URL:-http://192.168.1.176:7125}
      - PRINTER_CHAMBER_OBJECT=${PRINTER_CHAMBER_OBJECT:-temperature_sensor chamber_temp}
      - PRINTER_NAME=${PRINTER_NAME:-K2 Pro}
      - PRINTER_WEBRTC_URL=${PRINTER_WEBRTC_URL:-}
      - PRINTER_SNAPSHOT_URL=${PRINTER_SNAPSHOT_URL:-}
      - PRINTER_FIXTURE=${PRINTER_FIXTURE:-}
      - CANON_PRINTER_URL=${CANON_PRINTER_URL:-}
      - CANON_PRINTER_NAME=${CANON_PRINTER_NAME:-}
      - TZ=${TZ:-America/New_York}
    extra_hosts:
      - "ai.local:host-gateway"
