# ai.tail9b2fcb.ts.net — tailscale-serve admin entrypoint
#
# Reached via `tailscale serve --https=443 http://localhost:80` on the pi.
# Tailscale terminates TLS using its auto-issued cert for the MagicDNS
# hostname, then forwards the request to nginx loopback on port 80.
# Tailscale itself enforces "tailnet-only" — only authenticated tailnet
# clients can reach the served port. Because the request hits nginx from
# 127.0.0.1 we can't gate by tailnet CIDR; instead we mark the request with
# X-Tailscale-Serve, and hooks.server.ts treats that header as a tailnet
# signal (admin-secret.conf still gates /admin/ via X-Admin-Auth).

server {
    listen 80;
    listen [::]:80;
    server_name ai.tail9b2fcb.ts.net;

    client_max_body_size 100m;
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;

    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location = / {
        return 302 /drinks/admin/;
    }

    location / {
        proxy_pass http://127.0.0.1:6173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Tailscale-Serve "1";
        include /etc/nginx/admin-secret.conf;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
