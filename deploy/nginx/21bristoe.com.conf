# nginx config for 21bristoe.com
# Managed file — do not edit directly on server; edit here and run deploy/deploy.sh
#
# INSTALL:
#   sudo cp deploy/nginx/21bristoe.com.conf /etc/nginx/sites-available/21bristoe.com
#   sudo ln -sf /etc/nginx/sites-available/21bristoe.com /etc/nginx/sites-enabled/21bristoe.com
#   sudo nginx -t && sudo systemctl reload nginx
#
# AFTER CERTBOT:
#   sudo certbot --nginx -d 21bristoe.com -d www.21bristoe.com
#   Then replace this file with the post-certbot version (see deploy/nginx/21bristoe.com.ssl.conf)

server {
    listen 80;
    listen [::]:80;
    server_name 21bristoe.com www.21bristoe.com;

    root /var/www/21bristoe.com;
    index index.html;

    # Certbot ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        try_files $uri $uri/ /404.html =404;
    }

    # Cache static assets
    location ~* \.(css|js|jpg|jpeg|png|gif|ico|svg|webp|avif|woff|woff2)$ {
        expires 30d;
        add_header Cache-Control "public";
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
