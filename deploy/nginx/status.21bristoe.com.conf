# status.21bristoe.com -> Uptime Kuma (127.0.0.1:6190)
#
# Install (AFTER adding the GoDaddy A record  status -> 24.170.229.234):
#   sudo cp deploy/nginx/status.21bristoe.com.conf /etc/nginx/sites-available/status.21bristoe.com
#   sudo ln -sf /etc/nginx/sites-available/status.21bristoe.com /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#   sudo certbot --nginx -d status.21bristoe.com    # auto-adds the 443 TLS block
#
# certbot rewrites this HTTP vhost in place to add the SSL server block.

server {
    listen 80;
    server_name status.21bristoe.com;

    location / {
        proxy_pass http://127.0.0.1:6190;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
