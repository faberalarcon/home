# 21bristoe.com — Production nginx config
# SSL managed by certbot. Cert: /etc/letsencrypt/live/21bristoe.com/
# Canonical URL: https://21bristoe.com (www redirects to non-www)

# Redirect all HTTP to HTTPS (canonical non-www)
server {
    listen 80;
    listen [::]:80;
    server_name 21bristoe.com www.21bristoe.com;
    return 301 https://21bristoe.com$request_uri;
}

# Redirect HTTPS www -> non-www
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://21bristoe.com$request_uri;
}

# Main HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/21bristoe.com;
    index index.html;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Custom 404 — error_page + internal location ensures correct 404 status code
    error_page 404 /404.html;
    location = /404.html {
        internal;
    }

    location / {
        try_files $uri $uri/ =404;
    }

    # Long-lived cache for Astro hashed assets (immutable filenames in /_assets/)
    location /_assets/ {
        expires 1y;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "public, immutable" always;
    }

    # Medium-lived cache for other static files
    location ~* \.(ico|svg|webp|avif|png|jpg|jpeg|woff|woff2|txt|xml|json)$ {
        expires 30d;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Frame-Options "DENY" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Content-Security-Policy "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self'; connect-src 'self'; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Cache-Control "public" always;
    }

    # Block hidden files
    location ~ /\. {
        deny all;
    }
}
