# 21bristoe.com — Production nginx config for unified SvelteKit app
# SSL managed by certbot. Canonical URL: https://21bristoe.com

server {
    listen 80;
    listen [::]:80;
    server_name 21bristoe.com www.21bristoe.com;
    return 301 https://21bristoe.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://21bristoe.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name 21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    client_max_body_size 100m;
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://21bristoe.com data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'wasm-unsafe-eval'; connect-src 'self' https://21bristoe.com; manifest-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=(), interest-cohort=()" always;

    location ^~ /uploads/ {
        alias /var/www/21bristoe-media/;
        expires 7d;
        add_header Cache-Control "public" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Access-Control-Allow-Origin "https://21bristoe.com" always;
    }

    location = /admin {
        return 308 https://admin.21bristoe.com/admin/;
    }

    location ^~ /admin/ {
        return 308 https://admin.21bristoe.com$request_uri;
    }

    # Legacy /drinks/admin URLs now live under /admin/drinks on the admin host.
    # Rewrite preserves subpaths and query string.
    location = /drinks/admin {
        return 308 https://admin.21bristoe.com/admin/drinks/;
    }

    location ^~ /drinks/admin/ {
        rewrite ^/drinks/admin/(.*)$ https://admin.21bristoe.com/admin/drinks/$1 permanent;
    }

    location ^~ /_app/immutable/ {
        proxy_pass http://127.0.0.1:6173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable" always;
    }

    location / {
        proxy_pass http://127.0.0.1:6173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }

    location ~ /\. {
        deny all;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name drink-hub.21bristoe.com;
    return 301 https://21bristoe.com/drinks$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name drink-hub.21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/drink-hub.21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/drink-hub.21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    return 301 https://21bristoe.com/drinks$request_uri;
}

