# admin.21bristoe.com — Image upload admin panel
# Proxies to Node/Express on localhost:3001
# Protected by HTTP basic auth + HTTPS

server {
    listen 80;
    listen [::]:80;
    server_name admin.21bristoe.com;
    return 301 https://admin.21bristoe.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/admin.21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    auth_basic "21 Bristoe Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-admin;

    client_max_body_size 100m;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'self'; img-src 'self' https://21bristoe.com data:; style-src 'self'; script-src 'self'; connect-src 'self' https://21bristoe.com;" always;

    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        # Shared secret proving the request came through this nginx vhost.
        # The included file (not in git) contains exactly:
        #   proxy_set_header X-Admin-Auth "<random-secret>";
        # The same secret must be set as ADMIN_SHARED_SECRET in
        # /etc/21bristoe-admin.env (loaded by the systemd unit).
        include /etc/nginx/admin-secret.conf;
        proxy_read_timeout 120;
        proxy_send_timeout 120;
    }
}
