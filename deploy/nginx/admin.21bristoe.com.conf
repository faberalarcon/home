# admin.21bristoe.com — protected admin entrypoint for unified SvelteKit app

server {
    listen 80;
    listen [::]:80;
    server_name admin.21bristoe.com;
    return 301 https://admin.21bristoe.com$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name admin.21bristoe.com;

    ssl_certificate /etc/letsencrypt/live/admin.21bristoe.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/admin.21bristoe.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    allow 100.64.0.0/10;
    allow fd7a:115c:a1e0::/48;
    deny all;

    auth_basic "21 Bristoe Admin";
    auth_basic_user_file /etc/nginx/.htpasswd-admin;

    client_max_body_size 100m;
    proxy_buffer_size 32k;
    proxy_buffers 16 32k;
    proxy_busy_buffers_size 64k;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    # NOTE: "no-referrer" caused some browsers to also elide the Origin header
    # on form POSTs, which then tripped SvelteKit's same-origin CSRF check.
    # "same-origin" still keeps the Referer off external sites but preserves
    # Origin for same-origin form submissions.
    add_header Referrer-Policy "same-origin" always;
    # Content-Security-Policy is set by the app (SvelteKit nonce-based CSP, see
    # kit.csp in svelte.config.js). Static add_header removed to avoid a
    # conflicting duplicate that would re-permit 'unsafe-inline'.

    location = / {
        return 302 /admin/;
    }

    location / {
        proxy_pass http://127.0.0.1:6173;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        include /etc/nginx/admin-secret.conf;
        proxy_read_timeout 300;
        proxy_send_timeout 300;
    }
}
