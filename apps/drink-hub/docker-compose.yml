services:
  drink-hub:
    build:
      context: ../..
      dockerfile: apps/drink-hub/Dockerfile
      args:
        - BASE_PATH=${BASE_PATH:-/drinks}
        - CSRF_TRUSTED_ORIGINS=${CSRF_TRUSTED_ORIGINS:-https://21bristoe.com}
    container_name: drink-hub
    restart: unless-stopped
    ports:
      # Bind to loopback only — nginx (or another reverse proxy) should front this.
      # The app is not meant to be reachable directly from the public internet.
      - "127.0.0.1:5173:3000"
    volumes:
      - ${DRINK_HUB_DATA_DIR:-/var/lib/21bristoe/drink-hub}:/app/data
    read_only: true
    tmpfs:
      - /tmp:size=32m,mode=1777
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    environment:
      - DATABASE_PATH=/app/data/drink-hub.db
      - BODY_SIZE_LIMIT=10485760
      - BASE_PATH=${BASE_PATH:-/drinks}
      - ORIGIN=${ORIGIN:-https://21bristoe.com}
      - PROTOCOL_HEADER=x-forwarded-proto
      - HOST_HEADER=x-forwarded-host
      - ADDRESS_HEADER=x-forwarded-for
      - XFF_DEPTH=1
      - SITE_PASSWORD=${SITE_PASSWORD:-}
      - SITE_PASSWORD_HASH=${SITE_PASSWORD_HASH:-}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - SESSION_SECRET=${SESSION_SECRET:-}
      - HA_STRICT_PUBLIC=${HA_STRICT_PUBLIC:-}
      - TZ=${TZ:-America/New_York}
    extra_hosts:
      - "ai.local:host-gateway"
